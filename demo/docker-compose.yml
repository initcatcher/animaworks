services:
  animaworks-demo:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    ports:
      - "18501:18501"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PRESET: ${PRESET:-en-business}
      TZ: ${TZ:-Asia/Tokyo}
    volumes:
      - animaworks-demo-data:/root/.animaworks

volumes:
  animaworks-demo-data:
